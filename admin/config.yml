backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

# Image picker + crop via Cloudinary Media Library — see admin/README.md
media_library:
  name: cloudinary
  config:
    cloud_name: doxvoohbv
    api_key: 262929882165832

editorial_workflow: true

